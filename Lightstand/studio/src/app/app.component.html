<ion-app>
  <ion-split-pane contentId="main-content">
    <ion-menu contentId="main-content" type="overlay">
      <ion-content>
        <ion-title style="font-size: 40px; padding:2px 1px 0px 12px;">Studio</ion-title>
        <ion-list id="section-list">
          <!-- <ion-list-header style="font-size: xx-large;">Studio</ion-list-header> -->


          <div style="margin-top: 100px;"></div>
          <ion-menu-toggle auto-hide="false" *ngFor="let p of appPages; let i = index">
            <ion-item routerDirection="root" [routerLink]="[p.url]" lines="none" detail="false" routerLinkActive="selected">
              <!-- <ion-icon aria-hidden="true" slot="start" [ios]="p.icon + '-outline'" [md]="p.icon + '-sharp'"></ion-icon> -->
              <ion-label>{{ p.title }}</ion-label>
            </ion-item>
          </ion-menu-toggle>

          <div style="margin-top: 100px;"></div>

          <ion-item lines="none">
            <ion-label>Credits 42</ion-label>
          </ion-item>

          <div style="margin-top: 100px;"></div>

          <ion-item lines="none">
            <ion-icon name="person-circle-outline"></ion-icon>
          </ion-item>

          <ion-item lines="none">
            <ion-label>
              Settings
            </ion-label>
            <!-- <ion-icon name="cog-outline"></ion-icon> -->
          </ion-item>

        </ion-list>


      </ion-content>
    </ion-menu>
    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>

  <div >
    <ion-modal [isOpen]="databaseService.showLoginModal" [initialBreakpoint]="0.5" [breakpoints]="[0, 0.25, 0.5, 0.75]" (ionModalWillDismiss)="databaseService.dismissModal()">
      <ng-template>
        <ion-content>
          <div class="white_background">
            <ion-grid>
              <ion-row>
                <ion-col class="title-60">
                  <ion-title >
                    Sign-in
                  </ion-title>
                </ion-col>
              </ion-row>
              <section></section>
              <!-- <ion-row>
                <ion-col>
                  <ion-button
                  type="submit"
                  color="danger"
                  (click)="authService.googleAuth()"
                  expand="block">
                    Login with Google <ion-icon slot="end" name="logo-google"></ion-icon>
                 </ion-button>
                </ion-col>
              </ion-row> -->
              <!-- <ion-row>
                <ion-col>
                  <ion-button
                  type="submit"
                  color="primary"
                  (click)="authService.facebookAuth()"
                  expand="block">
                    Login with Facebook <ion-icon slot="end" name="logo-facebook"></ion-icon>
                 </ion-button>
                </ion-col>
              </ion-row> -->

            </ion-grid>
          </div>
        </ion-content>
      </ng-template>
    </ion-modal>
  </div>


</ion-app>
